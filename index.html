<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>OpenArranger</title>
	<link rel="stylesheet" href="style.css">

	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('./sw.js')
					.then(() => console.log('App pronto para uso Offline!'))
					.catch((err) => console.log('Erro no SW:', err));
			});
		}
	</script>
	<link rel="manifest" href="./manifest.json">

	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Contrato">
	<meta name="theme-color" content="#1e1e1e">
	<link rel="apple-touch-icon" href="./assets/maskable_icon_x512.png">
</head>
<body>

	<header>
		<h1>OpenArranger <span id="app-version"></span></h1>
		<div class="lcd-screen">
			<div class="lcd-content">
				<div class="header-top">
					<div class="load-zone">
						<div class="style-selector">
							<select id="style-select" title="Styles carregados"></select>
							<button id="btn-add-style" class="load-btn" title="Adicionar style">Style</button>
						</div>
						<div class="style-selector">
							<select id="kit-select" title="SFZs do kit"></select>
							<button id="btn-load-kit" class="load-btn" title="Carregar drumkit">Kit</button>
						</div>
						<button id="btn-debug" class="info-btn" title="Info">i</button>
					</div>
				</div>
				<div id="status-bar" class="status-bar">Inicializando...</div>
				<div class="transport-zone">
					<div class="bpm-block">
						<span class="transport-label">Bpm</span>
						<div class="bpm-controls">
							<button id="bpm-minus">-</button>
							<input type="number" id="bpm-display" value="120" min="40" max="250">
							<button id="bpm-plus">+</button>
						</div>
					</div>
					<div class="tap-tempo-block">
						<span class="transport-label">Tap</span>
						<span id="beat-indicator" class="indicator" title="Toque para tap tempo">*</span>
					</div>
					<div class="volume-block">
						<span class="transport-label">Volume</span>
						<input type="range" id="volume-slider" min="0" max="100" value="100" title="Volume master">
					</div>
					<div class="quant-block">
						<span class="transport-label">Quantization</span>
						<select class="lcd-value" id="quantization" title="Quantização">
							<option value="measure">Measure</option>
							<option value="half" selected>Half measure</option>
							<option value="beat">Beat</option>
							<option value="immediate">Imediate</option>
						</select>
					</div>
				</div>

				<input type="file" id="input-kit" accept=".kit" style="display:none">
				<input type="file" id="input-style" accept=".style" multiple style="display:none">
			</div>
		</div>
	</header>

	<div id="debug-modal" class="debug-modal" style="display:none;">
		<div class="debug-content">
			<button id="close-debug" class="close-btn">✕</button>
			<h2>STYLE</h2>
			<div id="debug-info"></div>
		</div>
	</div>

	<main class="grid-container">
		<button class="btn intro-btn"  data-section="Intro A">Intro A</button>
		<button class="btn fill-btn"   data-section="Fill In A">Fill In A</button>
		<button class="btn main-btn active" data-section="Main A">Main A</button>
		<button class="btn ending-btn" data-section="Ending A">Ending A</button>

		<button class="btn intro-btn"  data-section="Intro B">Intro B</button>
		<button class="btn fill-btn"   data-section="Fill In B">Fill In B</button>
		<button class="btn main-btn"   data-section="Main B">Main B</button>
		<button class="btn ending-btn" data-section="Ending B">Ending B</button>

		<button class="btn intro-btn"  data-section="Intro C">Intro C</button>
		<button class="btn fill-btn"   data-section="Fill In C">Fill In C</button>
		<button class="btn main-btn"   data-section="Main C">Main C</button>
		<button class="btn ending-btn" data-section="Ending C">Ending C</button>

		<div class="empty-cell"></div>
		<button class="btn fill-btn"   data-section="Fill In D">Fill In D</button>
		<button class="btn main-btn"   data-section="Main D">Main D</button>
		<div class="empty-cell"></div>

		<div class="empty-cell"></div>
		<button class="btn break-btn"  data-section="Break">Break</button>
		<div class="empty-cell"></div>
		<button id="btn-play" class="play-btn">Start</button>
	</main>

	<script src="main.js"></script>
</body>
</html>
